function BagArt({ cup }) {
  const { bagColor, bagAccent, bagShape } = cup;
  const svgStyle = { width: '100%', height: '100%', display: 'block' };

  function LabelText({ x, y }) {
    return (
      <>
        <text x={x} y={y} textAnchor="middle" dominantBaseline="middle"
          fill="rgba(255,255,255,0.93)" fontFamily="DM Serif Display, Georgia, serif" fontSize="11">
          {cup.bean}
        </text>
        <text x={x} y={y + 16} textAnchor="middle" dominantBaseline="middle"
          fill="rgba(255,255,255,0.50)" fontFamily="DM Sans, sans-serif" fontSize="7" letterSpacing="0.3">
          {cup.roaster}
        </text>
        <text x={x} y={y + 28} textAnchor="middle" dominantBaseline="middle"
          fill="rgba(255,255,255,0.28)" fontFamily="DM Sans, sans-serif" fontSize="6" letterSpacing="1.8">
          {cup.process.toUpperCase()}
        </text>
      </>
    );
  }

  // Bag 1 — gusseted stand-up pouch with 3D side panels (103×166)
  if (bagShape === 1) {
    return (
      <svg viewBox="0 0 103 166" xmlns="http://www.w3.org/2000/svg" style={svgStyle} preserveAspectRatio="xMidYMid meet">
        <rect opacity="0.8" y="54" width="85" height="98" fill={bagColor}/>
        <path d="M18 66.5H103L103 166H18.0001L18 66.5Z" fill={bagAccent}/>
        <path d="M0 54L18 65.2V166L0 154.8V54Z" fill={bagColor}/>
        <path opacity="0.8" d="M85 54L103 65.2V166L85 154.8V54Z" fill={bagAccent}/>
        <rect x="15" width="76" height="18" fill={bagAccent}/>
        <path d="M15 18H91L85 54H0L15 18Z" fill={bagColor}/>
        <path d="M15 18H91L103 66.5H18L15 18Z" fill={bagAccent}/>
        <path d="M27.1188 83.1143C27.0539 81.4139 28.4149 80 30.1166 80H91.8834C93.5851 80 94.9461 81.4139 94.8812 83.1143L92.6309 142.114C92.5694 143.726 91.2454 145 89.6331 145H32.3669C30.7546 145 29.4306 143.726 29.3691 142.114L27.1188 83.1143Z" fill="rgba(0,0,0,0.28)"/>
        <path d="M16.5 45L18 66L0 54L16.5 45Z" fill={bagColor}/>
        <LabelText x={61} y={106} />
      </svg>
    );
  }

  // Bag 2 — rounded flat-front pouch (112×150)
  if (bagShape === 2) {
    return (
      <svg viewBox="0 0 112 150" xmlns="http://www.w3.org/2000/svg" style={svgStyle} preserveAspectRatio="xMidYMid meet">
        <path d="M0.314981 6.29962C0.143626 2.87252 2.87611 0 6.3075 0H105.693C109.124 0 111.856 2.87252 111.685 6.29963L104.785 144.3C104.625 147.493 101.99 150 98.7925 150H13.2075C10.0103 150 7.37464 147.493 7.21498 144.3L0.314981 6.29962Z" fill={bagColor}/>
        <path d="M12.1554 45.1479C12.0708 43.435 13.4368 42 15.1517 42H96.8483C98.5632 42 99.9292 43.435 99.8446 45.1479L96.9324 104.148C96.8536 105.745 95.5355 107 93.9361 107H18.0639C16.4645 107 15.1464 105.745 15.0676 104.148L12.1554 45.1479Z" fill="rgba(0,0,0,0.26)"/>
        <path d="M3 11.5C3 11.2239 3.22386 11 3.5 11H108.5C108.776 11 109 11.2239 109 11.5C109 11.7761 108.776 12 108.5 12H3.5C3.22386 12 3 11.7761 3 11.5Z" fill={bagAccent}/>
        <path d="M3 13.5C3 13.2239 3.22386 13 3.5 13H108.5C108.776 13 109 13.2239 109 13.5C109 13.7761 108.776 14 108.5 14H3.5C3.22386 14 3 13.7761 3 13.5Z" fill={bagAccent}/>
        <path d="M3 15.5C3 15.2239 3.22386 15 3.5 15H108.5C108.776 15 109 15.2239 109 15.5C109 15.7761 108.776 16 108.5 16H3.5C3.22386 16 3 15.7761 3 15.5Z" fill={bagAccent}/>
        <text x="56" y="134" textAnchor="middle" dominantBaseline="middle"
          fill="rgba(255,255,255,0.28)" fontFamily="DM Sans, sans-serif" fontSize="7" letterSpacing="2">
          {cup.origin.toUpperCase()}
        </text>
        <LabelText x={56} y={68} />
      </svg>
    );
  }

  // Bag 3 — rectangular standup with inset face (100×168)
  return (
    <svg viewBox="0 0 100 168" xmlns="http://www.w3.org/2000/svg" style={svgStyle} preserveAspectRatio="xMidYMid meet">
      <path d="M3.5 0H96.5L100 143.5L96.5 168H3.5L0 143.5L3.5 0Z" fill={bagAccent}/>
      <rect x="7.5" y="9" width="84" height="153" fill={bagColor}/>
      <path d="M10.637 63.1311C10.5623 61.4244 11.9258 60 13.6341 60H85.3659C87.0742 60 88.4377 61.4244 88.363 63.1311L85.7818 122.131C85.7116 123.735 84.3905 125 82.7846 125H16.2154C14.6095 125 13.2884 123.735 13.2182 122.131L10.637 63.1311Z" fill="rgba(0,0,0,0.26)"/>
      <path d="M5.5 13.5C5.5 13.2239 5.72386 13 6 13H93C93.2761 13 93.5 13.2239 93.5 13.5C93.5 13.7761 93.2761 14 93 14H6C5.72386 14 5.5 13.7761 5.5 13.5Z" fill={bagAccent}/>
      <path d="M5.5 15.5C5.5 15.2239 5.72386 15 6 15H93C93.2761 15 93.5 15.2239 93.5 15.5C93.5 15.7761 93.2761 16 93 16H6C5.72386 16 5.5 15.7761 5.5 15.5Z" fill={bagAccent}/>
      <path d="M5.5 17.5C5.5 17.2239 5.72386 17 6 17H93C93.2761 17 93.5 17.2239 93.5 17.5C93.5 17.7761 93.2761 18 93 18H6C5.72386 18 5.5 17.7761 5.5 17.5Z" fill={bagAccent}/>
      <text x="50" y="154" textAnchor="middle" dominantBaseline="middle"
        fill="rgba(255,255,255,0.28)" fontFamily="DM Sans, sans-serif" fontSize="7" letterSpacing="2">
        {cup.origin.toUpperCase()}
      </text>
      <LabelText x={50} y={86} />
    </svg>
  );
}

function Stars({ rating, max = 5 }) {
  return (
    <div style={{ display: 'flex', gap: '3px', alignItems: 'center' }}>
      {Array.from({ length: max }).map((_, i) => (
        <svg key={i} width="9" height="9" viewBox="0 0 9 9">
          <polygon
            points="4.5,0.5 5.6,3.2 8.5,3.4 6.4,5.3 7.1,8.1 4.5,6.6 1.9,8.1 2.6,5.3 0.5,3.4 3.4,3.2"
            fill={i < rating ? '#6E8B72' : 'none'}
            stroke={i < rating ? '#6E8B72' : '#C5BDB6'}
            strokeWidth="0.75"
          />
        </svg>
      ))}
    </div>
  );
}

function CupCard({ cup }) {
  return (
    <div style={{ width: '100%', height: '100%' }}>
      <BagArt cup={cup} />
    </div>
  );
}

function CupboardGrid({ cells }) {
  return (
    <div>
      {/* Outer frame — full bleed */}
      <div style={{
        background: '#DEC99A',
        padding: '24px',
        boxShadow: 'inset 0 3px 0 rgba(255,255,255,0.30), inset 0 -3px 0 rgba(0,0,0,0.10)',
      }}>
        {/* Grid — gap becomes the wooden dividers */}
        <div style={{
          display: 'grid',
          gridTemplateColumns: '1fr 1fr',
          gap: '10px',
          position: 'relative',
        }}>
          {cells.map((cup, i) => (
            <div
              key={i}
              style={{
                background: '#BFA06A',
                padding: cup ? '16px' : '0',
                aspectRatio: '3 / 4',
                boxShadow: [
                  'inset 0 10px 18px rgba(0,0,0,0.22)',   /* ceiling shadow falling down */
                  'inset 6px 0 12px rgba(0,0,0,0.12)',    /* left wall shadow */
                  'inset -3px 0 8px rgba(0,0,0,0.07)',    /* right wall shadow */
                  'inset 0 -4px 6px rgba(255,255,255,0.08)', /* floor bounce */
                ].join(', '),
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                overflow: 'hidden',
              }}
            >
              {cup ? <CupCard cup={cup} /> : null}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function createBeanIcon(count, isSelected, isDimmed) {
  const fill    = isSelected ? '#6E8B72' : isDimmed ? '#C5BDB6' : '#4A4540';
  const badgeColor = isSelected ? '#6E8B72' : '#4A4540';
  const size    = isSelected ? 36 : 30;
  const half    = size / 2;
  const rx      = size * 0.28;
  const ry      = size * 0.40;
  // Bean shape: rotated ellipse + crease line
  const beanSvg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;"><ellipse cx="${half}" cy="${half}" rx="${rx}" ry="${ry}" fill="${fill}" transform="rotate(-20 ${half} ${half})"/><path d="M${half - rx * 0.1},${half - ry * 0.65} Q${half + rx * 0.85},${half} ${half + rx * 0.5},${half + ry * 0.65}" stroke="rgba(255,255,255,0.35)" stroke-width="1.4" fill="none" transform="rotate(-20 ${half} ${half})"/></svg>`;
  const badge   = count > 1
    ? `<div style="position:absolute;top:-3px;right:-4px;min-width:14px;height:14px;padding:0 3px;background:#FAF7F2;border:1.5px solid ${badgeColor};border-radius:7px;font-size:8px;font-family:DM Sans,sans-serif;font-weight:600;color:${badgeColor};display:flex;align-items:center;justify-content:center;line-height:1;box-sizing:border-box;">${count}</div>`
    : '';
  return L.divIcon({
    html: `<div style="position:relative;display:inline-block;">${beanSvg}${badge}</div>`,
    className: '',
    iconSize:   [size, size],
    iconAnchor: [half, half],
  });
}

function ExploreScreen({ cups }) {
  const [selectedOrigin, setSelectedOrigin] = React.useState(null);
  const [sheetExpanded, setSheetExpanded]   = React.useState(false);
  const mapContainerRef = React.useRef(null);
  const mapInstanceRef  = React.useRef(null);
  const markersRef      = React.useRef({});

  const originGroups = React.useMemo(() =>
    cups.reduce((acc, cup) => {
      acc[cup.origin] = acc[cup.origin] || [];
      acc[cup.origin].push(cup);
      return acc;
    }, {}),
  [cups]);

  const filteredCups = selectedOrigin
    ? cups.filter(c => c.origin === selectedOrigin)
    : cups;

  // Initialise map once on mount
  React.useEffect(() => {
    if (!mapContainerRef.current || mapInstanceRef.current) return;

    // Zoom where world tiles >= container height so no background ever shows
    const containerH = mapContainerRef.current.clientHeight;
    const minZ = Math.ceil(Math.log2(containerH / 256) * 4) / 4;

    const map = L.map(mapContainerRef.current, {
      center: [20, 15],
      zoom: minZ,
      zoomSnap: 0.25,
      zoomControl: false,
      attributionControl: false,
      scrollWheelZoom: false,
      dragging: true,
      minZoom: minZ,
      maxZoom: 5,
      maxBounds: [[-85, -180], [85, 180]],
      maxBoundsViscosity: 1.0,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 5,
    }).addTo(map);

    mapInstanceRef.current = map;

    map.on('click', () => setSelectedOrigin(null));

    Object.entries(originGroups).forEach(([origin, bags]) => {
      const coords = ORIGIN_COORDS[origin];
      if (!coords) return;
      const marker = L.marker(coords, {
        icon: createBeanIcon(bags.length, false, false),
      }).addTo(map);
      marker.on('click', () =>
        setSelectedOrigin(prev => (prev === origin ? null : origin))
      );
      markersRef.current[origin] = marker;
    });

    return () => {
      map.remove();
      mapInstanceRef.current = null;
      markersRef.current = {};
    };
  }, []);

  // Auto-expand sheet when a filter is selected
  // Update marker styles when selection changes
  React.useEffect(() => {
    Object.entries(markersRef.current).forEach(([origin, marker]) => {
      const count      = originGroups[origin]?.length || 0;
      const isSelected = selectedOrigin === origin;
      const isDimmed   = selectedOrigin !== null && !isSelected;
      marker.setIcon(createBeanIcon(count, isSelected, isDimmed));
    });
  }, [selectedOrigin]);

  const NAV_H        = 84;   // tab bar height — sheet always sits above it
  const PEEK_HEIGHT  = 196;
  const MAX_SHEET_H  = Math.floor(852 * 0.4); // 40% of phone height
  const ROW_H        = 82;
  const HEADER_H     = 60;   // handle (20) + list header (40)

  const sheetHeight = selectedOrigin !== null
    ? Math.min(HEADER_H + filteredCups.length * ROW_H + 16, MAX_SHEET_H)
    : sheetExpanded ? MAX_SHEET_H : PEEK_HEIGHT;

  return (
    <div style={{ flex: 1, position: 'relative' }}>

      {/* Map — overflow:hidden here clips Leaflet tiles; explicit zIndex creates a stacking
           context so Leaflet's internal panes (z 200–700) stay below the bottom sheet */}
      <div style={{ position: 'absolute', inset: 0, zIndex: 0, overflow: 'hidden' }}>
        <div ref={mapContainerRef} style={{ height: '100%' }} />

        {/* Title overlay */}
        <div style={{
          position: 'absolute',
          top: '16px',
          left: '18px',
          zIndex: 999,
          pointerEvents: 'none',
        }}>
          <div style={{
            fontFamily: 'DM Serif Display, Georgia, serif',
            fontSize: '24px',
            color: '#1A1714',
            lineHeight: 1,
            letterSpacing: '-0.3px',
            textShadow: '0 1px 4px rgba(250,247,242,0.7)',
          }}>Origins</div>
          <div style={{
            fontFamily: 'DM Sans, sans-serif',
            fontSize: '11px',
            color: '#4A4540',
            marginTop: '3px',
            textShadow: '0 1px 3px rgba(250,247,242,0.6)',
          }}>
            {Object.keys(originGroups).length} {Object.keys(originGroups).length === 1 ? 'country' : 'countries'} · {cups.length} coffees
          </div>
        </div>
      </div>

      {/* Zoom controls — sibling of bottom sheet so they share the same stacking context
           and both sit above the nav bar */}
      <div style={{
        position: 'absolute',
        bottom: `${sheetHeight + NAV_H + 14}px`,
        right: '10px',
        zIndex: 100,
        display: 'flex',
        flexDirection: 'column',
        gap: '8px',
        transition: 'bottom 0.32s cubic-bezier(0.4, 0, 0.2, 1)',
      }}>
        {[{ sym: '+', action: () => mapInstanceRef.current?.zoomIn() },
          { sym: '−', action: () => mapInstanceRef.current?.zoomOut() }].map(({ sym, action }) => (
          <button
            key={sym}
            onClick={action}
            style={{
              width: '44px',
              height: '44px',
              background: 'rgba(250,247,242,0.95)',
              backdropFilter: 'blur(10px)',
              WebkitBackdropFilter: 'blur(10px)',
              border: '0.5px solid rgba(26,23,20,0.15)',
              borderRadius: '12px',
              fontFamily: 'DM Sans, sans-serif',
              fontSize: '26px',
              fontWeight: 300,
              color: '#1A1714',
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              lineHeight: 1,
              boxShadow: '0 2px 8px rgba(0,0,0,0.12)',
              padding: 0,
            }}
          >
            {sym}
          </button>
        ))}
      </div>

      {/* Bottom sheet */}
      <div style={{
        position: 'absolute',
        bottom: `${NAV_H}px`,
        left: 0,
        right: 0,
        height: `${sheetHeight}px`,
        background: 'rgba(250,247,242,0.97)',
        backdropFilter: 'blur(24px)',
        WebkitBackdropFilter: 'blur(24px)',
        borderRadius: '18px 18px 0 0',
        boxShadow: '0 -2px 20px rgba(0,0,0,0.10)',
        transition: 'height 0.32s cubic-bezier(0.4, 0, 0.2, 1)',
        display: 'flex',
        flexDirection: 'column',
        zIndex: 100,
        overflow: 'hidden',
      }}>

        {/* Drag handle — tap to toggle */}
        <div
          onClick={() => setSheetExpanded(e => !e)}
          style={{
            paddingTop: '10px',
            paddingBottom: '6px',
            cursor: 'pointer',
            flexShrink: 0,
            display: 'flex',
            justifyContent: 'center',
          }}
        >
          <div style={{ width: '36px', height: '4px', borderRadius: '2px', background: '#D5CEC6' }} />
        </div>

        {/* Sheet header + filter chip */}
        <div style={{
          padding: '4px 20px 10px',
          flexShrink: 0,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
        }}>
          <span style={{
            fontFamily: 'DM Serif Display, Georgia, serif',
            fontSize: '17px',
            color: '#1A1714',
          }}>
            {selectedOrigin
              ? `${ORIGIN_FLAGS[selectedOrigin] || ''} ${selectedOrigin}`
              : 'All coffees'}
          </span>
          {selectedOrigin && (
            <button
              onClick={() => setSelectedOrigin(null)}
              style={{
                background: 'none',
                border: '1px solid #C5BDB6',
                borderRadius: '20px',
                padding: '3px 10px',
                fontFamily: 'DM Sans, sans-serif',
                fontSize: '11px',
                color: '#4A4540',
                cursor: 'pointer',
              }}
            >
              Clear ×
            </button>
          )}
        </div>

        {/* Scrollable bag list */}
        <div
          className="scrollable"
          style={{ flex: 1, overflowY: 'auto', padding: selectedOrigin ? '0 20px 16px' : '0 20px 88px' }}
        >
          {filteredCups.map(cup => (
            <div
              key={cup.id}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: '14px',
                padding: '10px 0',
                borderBottom: '0.5px solid rgba(26,23,20,0.07)',
              }}
            >
              <div style={{ width: '44px', height: '60px', flexShrink: 0, borderRadius: '3px', overflow: 'hidden' }}>
                <BagArt cup={cup} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontFamily: 'DM Serif Display, Georgia, serif',
                  fontSize: '15px',
                  color: '#1A1714',
                  lineHeight: 1.2,
                  marginBottom: '2px',
                }}>
                  {cup.bean}
                </div>
                <div style={{
                  fontFamily: 'DM Sans, sans-serif',
                  fontSize: '12px',
                  color: '#9A918A',
                  marginBottom: '5px',
                  overflow: 'hidden',
                  textOverflow: 'ellipsis',
                  whiteSpace: 'nowrap',
                }}>
                  {cup.roaster}
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <Stars rating={cup.rating} />
                  <span style={{ fontFamily: 'DM Sans, sans-serif', fontSize: '11px', color: '#9A918A' }}>
                    {ORIGIN_FLAGS[cup.origin] || ''} {cup.origin}

              </div>
              <div style={{ fontFamily: 'DM Sans, sans-serif', fontSize: '11px', color: '#C5BDB6', flexShrink: 0 }}>
                {cup.date}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function TabIcon({ type, active }) {
  const color = active ? '#6E8B72' : '#C5BDB6';
  if (type === 'home') return (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M3 10L11 3L19 10V19H14V14H8V19H3V10Z" stroke={color} strokeWidth="1.4" strokeLinejoin="round" fill="none"/>
    </svg>
  );
  if (type === 'search') return (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="10" cy="10" r="6.5" stroke={color} strokeWidth="1.4"/>
      <line x1="15.2" y1="15.2" x2="19" y2="19" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
    </svg>
  );
  if (type === 'add') return (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="8.5" stroke={color} strokeWidth="1.4"/>
      <line x1="11" y1="7" x2="11" y2="15" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      <line x1="7" y1="11" x2="15" y2="11" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
    </svg>
  );
  if (type === 'beans') return (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <ellipse cx="9" cy="11" rx="5" ry="7" stroke={color} strokeWidth="1.4" transform="rotate(-15 9 11)"/>
      <path d="M9,5 Q13,8 13,11 Q13,14 9,17" stroke={color} strokeWidth="1.4" strokeLinecap="round" fill="none"/>
    </svg>
  );
  if (type === 'profile') return (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="8" r="3.5" stroke={color} strokeWidth="1.4"/>
      <path d="M3.5 19C3.5 15.4 6.9 12.5 11 12.5C15.1 12.5 18.5 15.4 18.5 19" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
    </svg>
  );
  return null;
}
