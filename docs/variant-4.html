<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Variant 4 — Vertical Ticker</title>
<style>
  :root {
    --pearl: #f9eddd;
    --moss: #355c44;
    --supreme-beige: #cca68c;
    --vintage-burgundy: #5d0505;
    --blossom-pink: #fc999b;
    --chardonnay: #fdcb88;
    --black: #000000;
    --grey-dark: #6b6b6b;
    --grey-light: #d9d9d9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 390px;
    height: 844px;
    overflow: hidden;
    background: var(--pearl);
    font-family: 'Avenir', 'Avenir Next', system-ui, sans-serif;
  }

  .header {
    padding: 52px 24px 20px;
  }

  .header h2 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 28px;
    color: var(--black);
  }

  .ticker-viewport {
    position: absolute;
    left: 20px; right: 20px;
    top: 130px;
    bottom: 100px;
    overflow: hidden;
    border-radius: 28px;
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  /* perspective window clipping */
  .ticker-viewport::before,
  .ticker-viewport::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 80px;
    z-index: 10;
    pointer-events: none;
  }
  .ticker-viewport::before {
    top: 0;
    background: linear-gradient(to bottom, #fff 0%, rgba(255,255,255,0) 100%);
  }
  .ticker-viewport::after {
    bottom: 0;
    background: linear-gradient(to top, #fff 0%, rgba(255,255,255,0) 100%);
  }

  .ticker-track {
    position: absolute;
    left: 0; right: 0;
    top: 0;
    will-change: transform;
  }

  .ticker-row {
    height: 88px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--grey-light);
    position: relative;
    transition: background 0.2s;
    cursor: pointer;
    perspective: 600px;
    transform-style: preserve-3d;
  }

  .ticker-row:last-child { border-bottom: none; }

  .ticker-row.active {
    background: rgba(53,92,68,0.04);
  }

  .row-image {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    flex-shrink: 0;
    overflow: hidden;
    margin-right: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .row-info {
    flex: 1;
    min-width: 0;
  }

  .row-name {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 15px;
    color: var(--black);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-roaster {
    font-size: 12px;
    font-weight: 500;
    color: var(--vintage-burgundy);
    margin-top: 2px;
    margin-bottom: 4px;
  }

  .row-rating { font-size: 11px; letter-spacing: 0.5px; }

  .row-date {
    font-size: 11px;
    font-weight: 500;
    color: var(--grey-dark);
    flex-shrink: 0;
    margin-left: 8px;
    text-align: right;
  }

  .active-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--moss);
    border-radius: 0 2px 2px 0;
  }

  /* page-turn mask overlay */
  .flip-mask {
    position: absolute;
    left: 0; right: 0;
    top: 0;
    height: 88px;
    pointer-events: none;
    z-index: 5;
    transform-origin: top center;
  }

  .status-bar {
    position: absolute;
    bottom: 50px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--grey-light);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active { background: var(--moss); transform: scale(1.3); }
</style>
</head>
<body>

<div class="header">
  <h2>Recent Bags</h2>
</div>

<div class="ticker-viewport" id="viewport">
  <div class="ticker-track" id="track"></div>
</div>

<div class="status-bar" id="statusBar"></div>

<script>
const BEANS = [
  { name: "Devoción Wild Flora Washed Ethiopian", roaster: "@Devoción", date: "Yesterday", rating: 5, bg: "linear-gradient(135deg,#cca68c,#fdcb88)" },
  { name: "Onyx Geometry Natural Anaerobic", roaster: "@Onyx Coffee Lab", date: "3 days ago", rating: 4, bg: "linear-gradient(135deg,#355c44,#6b8c79)" },
  { name: "La Cabra Morning Washed Colombia", roaster: "@La Cabra", date: "Last week", rating: 5, bg: "linear-gradient(135deg,#fdcb88,#fc999b)" },
  { name: "Intelligentsia Black Cat Espresso", roaster: "@Intelligentsia", date: "2 weeks ago", rating: 3, bg: "linear-gradient(135deg,#5d0505,#a04040)" },
  { name: "Blue Bottle Giant Steps Ethiopia", roaster: "@Blue Bottle", date: "Last month", rating: 4, bg: "linear-gradient(135deg,#fc999b,#fdcb88)" },
];

const ROW_H = 88;
const VIEWPORT_H = 844 - 130 - 100;
const CENTER_OFFSET = Math.floor(VIEWPORT_H / 2 / ROW_H);

const track = document.getElementById('track');
const statusBar = document.getElementById('statusBar');
const viewport = document.getElementById('viewport');

let activeIdx = 0;
let isAnimating = false;
let isPaused = false;
let rows = [];

// Build 3 repeated sets for smooth looping
const REPEAT = 3;
const ALL_BEANS = [];
for (let r = 0; r < REPEAT; r++) ALL_BEANS.push(...BEANS);

function build() {
  track.innerHTML = '';
  statusBar.innerHTML = '';
  rows = [];

  ALL_BEANS.forEach((b, i) => {
    const row = document.createElement('div');
    row.className = 'ticker-row';
    row.innerHTML = `
      <div class="active-bar"></div>
      <div class="row-image" style="background:${b.bg}"></div>
      <div class="row-info">
        <div class="row-name">${b.name}</div>
        <div class="row-roaster">${b.roaster}</div>
        <div class="row-rating">${'☕'.repeat(b.rating)}${'·'.repeat(5-b.rating)}</div>
      </div>
      <div class="row-date">${b.date}</div>
    `;
    row.style.setProperty('--idx', i);
    track.appendChild(row);
    rows.push(row);
  });

  BEANS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    statusBar.appendChild(dot);
  });

  setPosition(BEANS.length + activeIdx, false);
  updateActive();
}

function setPosition(idx, animate) {
  const y = -(idx * ROW_H) + Math.floor(VIEWPORT_H / 2) - ROW_H / 2;
  if (animate) {
    track.style.transition = 'transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94)';
  } else {
    track.style.transition = 'none';
  }
  track.style.transform = `translateY(${y}px)`;
}

function updateActive() {
  const realIdx = activeIdx % BEANS.length;
  rows.forEach((r, i) => {
    r.classList.toggle('active', i % BEANS.length === realIdx);
    const bar = r.querySelector('.active-bar');
    bar.style.opacity = (i % BEANS.length === realIdx) ? '1' : '0';
  });
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === realIdx);
  });
}

function advance() {
  if (isPaused || isAnimating) return;
  isAnimating = true;
  activeIdx++;
  const displayIdx = BEANS.length + activeIdx;

  setPosition(displayIdx, true);
  updateActive();

  setTimeout(() => {
    isAnimating = false;
    // Loop: when we've gone through all beans twice, reset to middle set
    if (activeIdx >= BEANS.length * 2) {
      activeIdx = activeIdx % BEANS.length;
      setPosition(BEANS.length + activeIdx, false);
    }
  }, 560);
}

build();

viewport.addEventListener('mouseenter', () => { isPaused = true; });
viewport.addEventListener('mouseleave', () => { isPaused = false; });
viewport.addEventListener('touchstart', () => { isPaused = true; });
viewport.addEventListener('touchend', () => { setTimeout(() => isPaused = false, 1000); });

setInterval(advance, 1600);
</script>
</body>
</html>
