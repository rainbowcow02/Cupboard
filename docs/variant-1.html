<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Variant 1 — Stacked Deck</title>
<style>
  :root {
    --pearl: #f9eddd;
    --moss: #355c44;
    --supreme-beige: #cca68c;
    --vintage-burgundy: #5d0505;
    --blossom-pink: #fc999b;
    --chardonnay: #fdcb88;
    --black: #000000;
    --grey-dark: #6b6b6b;
    --grey-light: #d9d9d9;
    --card-radius: 34px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 390px;
    height: 844px;
    overflow: hidden;
    background: var(--pearl);
    font-family: 'Avenir', 'Avenir Next', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  h2.section-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 28px;
    color: var(--black);
    position: absolute;
    top: 52px;
    left: 24px;
  }

  .deck-container {
    position: relative;
    width: 320px;
    height: 420px;
    margin-top: 20px;
  }

  .card {
    position: absolute;
    width: 320px;
    height: 400px;
    border-radius: var(--card-radius);
    background: #fff;
    box-shadow: 0px 8px 40px rgba(0,0,0,0.12);
    overflow: hidden;
    cursor: grab;
    user-select: none;
    touch-action: none;
    will-change: transform;
    transition: box-shadow 0.2s;
  }

  .card:active { cursor: grabbing; }

  .card-image {
    width: 100%;
    height: 220px;
    background: linear-gradient(135deg, var(--supreme-beige) 0%, var(--chardonnay) 100%);
    position: relative;
    overflow: hidden;
  }

  .card-image::after {
    content: '☕';
    font-size: 72px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.3;
  }

  .bean-number {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--moss);
  }

  .card-body {
    padding: 18px 20px 16px;
  }

  .bean-name {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 18px;
    color: var(--black);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .roaster {
    font-size: 13px;
    font-weight: 500;
    color: var(--vintage-burgundy);
    margin-bottom: 4px;
  }

  .meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
  }

  .date {
    font-size: 12px;
    font-weight: 500;
    color: var(--grey-dark);
  }

  .rating {
    font-size: 14px;
    letter-spacing: 1px;
  }

  .swipe-hint {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--grey-dark);
    opacity: 0.7;
  }
</style>
</head>
<body>

<h2 class="section-title">Recent Bags</h2>

<div class="deck-container" id="deck"></div>
<div class="swipe-hint">Swipe to explore →</div>

<script>
const BEANS = [
  { name: "Devoción Wild Flora\nWashed Ethiopian", roaster: "@Devoción", date: "Yesterday", rating: 5, bg: "linear-gradient(135deg,#cca68c,#fdcb88)" },
  { name: "Onyx Geometry\nNatural Anaerobic", roaster: "@Onyx Coffee Lab", date: "3 days ago", rating: 4, bg: "linear-gradient(135deg,#355c44,#cca68c)" },
  { name: "La Cabra Morning\nWashed Colombia", roaster: "@La Cabra", date: "Last week", rating: 5, bg: "linear-gradient(135deg,#fdcb88,#fc999b)" },
  { name: "Intelligentsia Black\nCat Espresso", roaster: "@Intelligentsia", date: "2 weeks ago", rating: 3, bg: "linear-gradient(135deg,#5d0505,#cca68c)" },
  { name: "Blue Bottle Giant\nSteps Ethiopia", roaster: "@Blue Bottle", date: "Last month", rating: 4, bg: "linear-gradient(135deg,#fc999b,#fdcb88)" },
];

const deck = document.getElementById('deck');
let cards = [];
let topIndex = 0;
let isDragging = false;
let startX = 0, startY = 0;
let currentX = 0, currentY = 0;
let autoPlayInterval = null;

function makeCard(bean, index, stackPos) {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="card-image" style="background:${bean.bg}">
      <div class="bean-number">${stackPos + 1}</div>
    </div>
    <div class="card-body">
      <div class="bean-name">${bean.name.replace('\n','<br>')}</div>
      <div class="roaster">${bean.roaster}</div>
      <div class="meta-row">
        <span class="date">${bean.date}</span>
        <span class="rating">${'☕'.repeat(bean.rating)}${'·'.repeat(5-bean.rating)}</span>
      </div>
    </div>
  `;
  return el;
}

function buildDeck() {
  deck.innerHTML = '';
  cards = [];
  const count = Math.min(4, BEANS.length);
  for (let i = count - 1; i >= 0; i--) {
    const bean = BEANS[(topIndex + i) % BEANS.length];
    const el = makeCard(bean, topIndex + i, i);
    const scale = 1 - i * 0.04;
    const yOffset = i * 10;
    el.style.transform = `translateY(${yOffset}px) scale(${scale})`;
    el.style.zIndex = count - i;
    el.style.opacity = i === 0 ? '1' : `${0.9 - i * 0.1}`;
    deck.appendChild(el);
    cards.unshift(el);
  }
  attachDrag(cards[cards.length - 1]);
}

function dismissTop(direction) {
  const top = cards[cards.length - 1];
  if (!top) return;
  const tx = direction * 500;
  const rot = direction * 25;
  top.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s';
  top.style.transform = `translateX(${tx}px) rotate(${rot}deg)`;
  top.style.opacity = '0';
  setTimeout(() => {
    topIndex = (topIndex + 1) % BEANS.length;
    buildDeck();
  }, 380);
}

function attachDrag(el) {
  if (!el) return;
  el.addEventListener('pointerdown', onDown);
}

function onDown(e) {
  if (isDragging) return;
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;
  clearInterval(autoPlayInterval);
  const el = cards[cards.length - 1];
  el.style.transition = 'none';
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
}

function onMove(e) {
  if (!isDragging) return;
  currentX = e.clientX - startX;
  currentY = e.clientY - startY;
  const rot = currentX * 0.08;
  const el = cards[cards.length - 1];
  el.style.transform = `translateX(${currentX}px) translateY(${currentY}px) rotate(${rot}deg)`;
}

function onUp(e) {
  if (!isDragging) return;
  isDragging = false;
  window.removeEventListener('pointermove', onMove);
  window.removeEventListener('pointerup', onUp);
  const el = cards[cards.length - 1];
  if (Math.abs(currentX) > 100) {
    dismissTop(currentX > 0 ? 1 : -1);
  } else {
    el.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
    el.style.transform = 'translateY(0px) scale(1)';
    startAutoPlay();
  }
  currentX = 0; currentY = 0;
}

function startAutoPlay() {
  clearInterval(autoPlayInterval);
  autoPlayInterval = setInterval(() => {
    if (!isDragging) dismissTop(1);
  }, 2200);
}

buildDeck();
startAutoPlay();
</script>
</body>
</html>
